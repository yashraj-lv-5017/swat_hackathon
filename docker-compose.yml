version: '3.8'
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: hackathon-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: hackathon-postgres
    environment:
      POSTGRES_USER: hackuser
      POSTGRES_PASSWORD: hackpass
      POSTGRES_DB: hackdb
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hackathon-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  qdrant_data:
  pg_data: